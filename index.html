<!DOCTYPE html>
<html>
<head>
  <title>Advanced Map App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>


  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<button id="menuBtn">☰</button>

<div id="sidebar">
  <h2>Filters</h2>

  <input type="text" id="searchBox" placeholder="Search location...">

  <h3>Categories</h3>
  <label><input type="checkbox" id="hospitalToggle" checked> 🏥 Hospitals</label>
  <label><input type="checkbox" id="parkToggle" checked> 🌳 Parks</label>

  <h3>Tools</h3>
  <button id="distanceBtn">📏 Measure Distance</button>
  <button id="drawBtn">🔺 Draw Area</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script src="script.js"></script>

</body>
</html>
